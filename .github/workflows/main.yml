name: Forex Signal Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create folders
        run: |
          mkdir -p logs
          mkdir -p data

      - name: Create .env
        run: |
          cat > .env <<EOF
          APP_ENV=production
          LOG_LEVEL=INFO
          DATA_PROVIDER=alpha_vantage
          ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SCAN_INTERVAL_MINUTES=15
          SYMBOLS=EUR/USD,GBP/USD
          TIMEFRAMES=15min,1h
          RSI_BUY_THRESHOLD=55
          RSI_SELL_THRESHOLD=45
          RISK_REWARD_RATIO=2.0
          ENABLE_BREAKOUT_FILTER=true
          SIGNAL_CONFLUENCE_MIN=3
          OUTLOOK_SMTP_HOST=smtp.office365.com
          OUTLOOK_SMTP_PORT=587
          OUTLOOK_EMAIL=${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_PASSWORD=${{ secrets.OUTLOOK_PASSWORD }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          STATE_FILE=data/sent_signals.json
          LOG_FILE=logs/app.log
          EOF

      - name: Run bot
        run: python main.py --mode once

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sent_signals.json || true
          git diff --cached --quiet || git commit -m "Update signals"
          git push
